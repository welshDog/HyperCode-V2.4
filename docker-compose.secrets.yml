# 🗝️ Phase 10C — Docker Secrets Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
# All secret values live in ./secrets/*.txt — NEVER in .env
#
# ⚠️ EXCLUSIVE CONFLICT RULE:
# Grafana: GF_SECURITY_ADMIN_PASSWORD + GF_SECURITY_ADMIN_PASSWORD__FILE are exclusive
# Postgres: POSTGRES_PASSWORD + POSTGRES_PASSWORD_FILE are exclusive
# Solution: Both use plain env var from .env ONLY — no _FILE override here

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  api_key:
    file: ./secrets/api_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  discord_token:
    file: ./secrets/discord_token.txt
  orchestrator_api_key:
    file: ./secrets/orchestrator_api_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  minio_root_user:
    file: ./secrets/minio_root_user.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  perplexity_api_key:
    file: ./secrets/perplexity_api_key.txt
  memory_key:
    file: ./secrets/memory_key.txt

services:

  # ✅ postgres — plain POSTGRES_PASSWORD from .env only (no _FILE)
  # ✅ grafana — plain GF_SECURITY_ADMIN_PASSWORD from .env only (no __FILE)
  # Both services treat their password vars as exclusive — only one can be set!

  hypercode-core:
    environment:
      HYPERCODE_REDIS_URL: ${HYPERCODE_REDIS_URL}
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/memory_key
      API_KEY_FILE: /run/secrets/api_key
      HYPERCODE_JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
    secrets:
      - api_key
      - jwt_secret
      - perplexity_api_key
      - memory_key
      - anthropic_api_key

  broski-bot:
    environment:
      DISCORD_TOKEN_FILE: /run/secrets/discord_token
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - discord_token
      - perplexity_api_key
      - openai_api_key

  # grafana — NO override needed here, uses GF_SECURITY_ADMIN_PASSWORD from .env

  minio:
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password

  crew-orchestrator:
    environment:
      ORCHESTRATOR_API_KEY_FILE: /run/secrets/orchestrator_api_key
    secrets:
      - orchestrator_api_key

  dashboard:
    environment:
      ORCHESTRATOR_API_KEY_FILE: /run/secrets/orchestrator_api_key
    secrets:
      - orchestrator_api_key

  celery-worker:
    environment:
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/memory_key
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - perplexity_api_key
      - memory_key

  hyperhealth-api:
    environment:
      API_KEY_FILE: /run/secrets/api_key
    secrets:
      - api_key

  hyperhealth-worker:
    environment:
      API_KEY_FILE: /run/secrets/api_key
    secrets:
      - api_key

  project-strategist:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - perplexity_api_key
      - openai_api_key

  coder-agent:
    environment:
      HYPERCODE_API_KEY_FILE: /run/secrets/api_key
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - api_key
      - perplexity_api_key

  tips-tricks-writer:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - perplexity_api_key

  test-agent:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - perplexity_api_key
