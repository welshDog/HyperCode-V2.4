# docker-compose.secrets.yml — Docker Secrets overlay for HyperCode V2.0
# Usage: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# Replaces plaintext env-var credentials with Docker secrets.
# Run scripts/init-secrets.sh first to create the secret files.

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  hypercode_jwt_secret:
    file: ./secrets/hypercode_jwt_secret.txt
  api_key:
    file: ./secrets/api_key.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  hypercode_memory_key:
    file: ./secrets/hypercode_memory_key.txt
  discord_token:
    file: ./secrets/discord_token.txt
  orchestrator_api_key:
    file: ./secrets/orchestrator_api_key.txt

services:
  postgres:
    secrets: [postgres_password]
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_PASSWORD: ""  # override — DB uses _FILE variant

  hypercode-core:
    secrets:
      - postgres_password
      - hypercode_jwt_secret
      - api_key
      - hypercode_memory_key
    environment:
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      HYPERCODE_JWT_SECRET_FILE: /run/secrets/hypercode_jwt_secret
      API_KEY_FILE: /run/secrets/api_key
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/hypercode_memory_key

  celery-worker:
    secrets:
      - postgres_password
      - hypercode_jwt_secret
      - api_key
      - hypercode_memory_key
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      HYPERCODE_JWT_SECRET_FILE: /run/secrets/hypercode_jwt_secret
      API_KEY_FILE: /run/secrets/api_key
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/hypercode_memory_key

  minio:
    secrets: [minio_root_password]
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_ROOT_PASSWORD: ""

  broski-bot:
    secrets: [discord_token]
    environment:
      DISCORD_TOKEN_FILE: /run/secrets/discord_token
      DISCORD_TOKEN: ""

  crew-orchestrator:
    secrets: [orchestrator_api_key, api_key]
    environment:
      ORCHESTRATOR_API_KEY_FILE: /run/secrets/orchestrator_api_key
