# 🗝️ Phase 10C — Docker Secrets Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
# All secret values live in ./secrets/*.txt — NEVER in .env

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  api_key:
    file: ./secrets/api_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  discord_token:
    file: ./secrets/discord_token.txt
  orchestrator_api_key:
    file: ./secrets/orchestrator_api_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  minio_root_user:
    file: ./secrets/minio_root_user.txt
  minio_root_password:
    file: ./secrets/minio_root_password.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  perplexity_api_key:
    file: ./secrets/perplexity_api_key.txt
  memory_key:
    file: ./secrets/memory_key.txt

services:

  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hypercode}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password

  hypercode-core:
    environment:
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_REDIS_URL: ${HYPERCODE_REDIS_URL}
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/memory_key
      API_KEY_FILE: /run/secrets/api_key
      HYPERCODE_JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - postgres_password
      - api_key
      - jwt_secret
      - perplexity_api_key
      - memory_key

  broski-bot:
    environment:
      DISCORD_TOKEN_FILE: /run/secrets/discord_token
      DB_PASSWORD_FILE: /run/secrets/postgres_password
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - discord_token
      - postgres_password
      - perplexity_api_key
      - openai_api_key

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_password

  minio:
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password

  crew-orchestrator:
    environment:
      ORCHESTRATOR_API_KEY_FILE: /run/secrets/orchestrator_api_key
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - orchestrator_api_key
      - postgres_password

  dashboard:
    environment:
      ORCHESTRATOR_API_KEY_FILE: /run/secrets/orchestrator_api_key
    secrets:
      - orchestrator_api_key

  celery-worker:
    environment:
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_MEMORY_KEY_FILE: /run/secrets/memory_key
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - postgres_password
      - perplexity_api_key
      - memory_key

  healer-agent:
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
    secrets:
      - postgres_password

  hyperhealth-api:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      API_KEY_FILE: /run/secrets/api_key
    secrets:
      - postgres_password
      - api_key

  hyperhealth-worker:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}@postgres:5432/${POSTGRES_DB:-hypercode}
      API_KEY_FILE: /run/secrets/api_key
    secrets:
      - postgres_password
      - api_key

  project-strategist:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
    secrets:
      - perplexity_api_key
      - openai_api_key

  coder-agent:
    environment:
      HYPERCODE_API_KEY_FILE: /run/secrets/api_key
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - api_key
      - perplexity_api_key

  tips-tricks-writer:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - perplexity_api_key

  test-agent:
    environment:
      PERPLEXITY_API_KEY_FILE: /run/secrets/perplexity_api_key
    secrets:
      - perplexity_api_key
