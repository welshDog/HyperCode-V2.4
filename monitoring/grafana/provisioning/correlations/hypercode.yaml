apiVersion: 1

correlations:

  # Prometheus → Loki: jump from any metric to container logs
  - sourceUID: P1809F7CD0C75ACF3
    targetUID: loki
    label: "View agent logs"
    description: "Jump from metrics to logs for this container"
    type: query
    config:
      field: "container"
      target:
        expr: '{container="${__field.labels.container}"}'
      transformations:
        - type: logfmt
          field: container

  # Prometheus → Tempo: jump from metrics to traces (via exemplar traceID)
  - sourceUID: P1809F7CD0C75ACF3
    targetUID: tempo
    label: "View trace"
    description: "Jump from metric exemplar to full trace in Tempo"
    type: query
    config:
      field: "traceID"
      target:
        query: "${__value.raw}"

  # Loki → Tempo: jump from a log line containing trace_id to the trace
  - sourceUID: loki
    targetUID: tempo
    label: "View trace"
    description: "Jump from log line to full trace in Tempo"
    type: query
    config:
      field: "traceID"
      target:
        query: "${__value.raw}"

  # Tempo → Loki: jump from a trace span to container logs for the same service
  # Complements tracesToLogsV2 in datasource.yml with an explicit correlation
  # so the link appears in the span's side panel too.
  - sourceUID: tempo
    targetUID: loki
    label: "View container logs"
    description: "Jump from span to container logs for this service"
    type: query
    config:
      field: "service.name"
      target:
        expr: '{container=~".*${__value.raw}.*"}'
