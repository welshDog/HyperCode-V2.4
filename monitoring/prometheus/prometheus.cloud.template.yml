global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert_rules.yml"
  - "/etc/prometheus/docker_alerts.yml"
  - "/etc/prometheus/recording_rules.yaml"

remote_write:
  - url: "https://prometheus-prod-<REGION>.grafana.net/api/prom/push"
    basic_auth:
      username: "<GRAFANA_CLOUD_METRICS_INSTANCE_ID>"
      password: "<GRAFANA_CLOUD_METRICS_API_KEY>"
    write_relabel_configs:
      - source_labels: [job]
        regex: "cadvisor|minio"
        action: drop

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "hypercode-core"
    metrics_path: /metrics
    static_configs:
      - targets: ["hypercode-core:8000"]

  - job_name: "crew-orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets: ["crew-orchestrator:8080"]

  - job_name: "test-agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["test-agent:8080"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: /minio/v2/metrics/cluster

  - job_name: "celery-exporter"
    static_configs:
      - targets: ["celery-exporter:9808"]
