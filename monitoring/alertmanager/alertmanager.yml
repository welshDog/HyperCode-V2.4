global:
  resolve_timeout: 30s

route:
  receiver: blackhole
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: webhook
      group_wait: 5s
      group_interval: 30s
      repeat_interval: 1h
      matchers:
        - alertname=~"CrewOrchestratorDown|SmokeFailuresDetected"

receivers:
  - name: blackhole
  - name: webhook
    webhook_configs:
      - url: http://alert-webhook:8080/alerts
        send_resolved: true
