networks:
  # ── Internet-accessible networks ──────────────────────────────────────────
  frontend-net:
    driver: bridge
    name: hypercode_frontend_net
    # Ingress layer: dashboard, mission-ui, MCP server

  backend-net:
    driver: bridge
    name: hypercode_backend_net
    # Core app layer: hypercode-core, celery-worker, broski-bot, ollama
    # Internet access required for Claude / Perplexity / Discord external APIs

  agents-net:
    driver: bridge
    name: hypercode_agents_net
    # Agent + core layer: all AI agents communicate with hypercode-core here
    # Internet access required for LLM API calls (Anthropic, Perplexity, OpenAI)

  # ── Internal networks (no internet gateway — container-to-container only) ─
  data-net:
    driver: bridge
    name: hypercode_data_net
    internal: true  # postgres + redis — NEVER internet-accessible

  obs-net:
    driver: bridge
    name: hypercode_obs_net
    internal: true  # observability stack — isolated from agent network

volumes:
  trivy-cache:
  redis-data:
  postgres-data:
  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/grafana
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/prometheus
  ollama-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/ollama
  agent_memory:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/agent_memory
  minio_data:
  chroma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/chroma
  tempo-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/tempo
  loki-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/loki
  alertmanager-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HC_DATA_ROOT}/alertmanager
  promtail-positions:

services:
  # ====================
  # INFRASTRUCTURE
  # ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000 --protected-mode no
    volumes:
      - redis-data:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypercode}
      POSTGRES_DB: ${POSTGRES_DB:-hypercode}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # CORE SERVICES
  # ====================
  hypercode-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${HYPERCODE_CORE_IMAGE:-hypercode-core:latest}
    container_name: hypercode-core
    environment:
      - ENVIRONMENT=development
      - PRISMA_PY_DEBUG=0
      - HYPERCODE_REDIS_URL=${HYPERCODE_REDIS_URL}
      - HYPERCODE_DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hypercode}@postgres:5432/${POSTGRES_DB:-hypercode}
      - HYPERCODE_MEMORY_KEY=${HYPERCODE_MEMORY_KEY}
      - API_KEY=${API_KEY}
      - HYPERCODE_JWT_SECRET=${HYPERCODE_JWT_SECRET}
      - JWT_SECRET=${HYPERCODE_JWT_SECRET} # Ensure backward compatibility
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY} # Cloud API Key (Optional)
      # 🔌 Phase 10J — CognitiveUplink WS → crew-orchestrator proxy
      - CREW_ORCHESTRATOR_URL=http://crew-orchestrator:8080
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY:-}
      # 💳 Phase 10F — Stripe Payment Engine
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER:-}
      - STRIPE_PRICE_BUILDER=${STRIPE_PRICE_BUILDER:-}
      - STRIPE_PRICE_HYPER=${STRIPE_PRICE_HYPER:-}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY:-}
      - STRIPE_PRICE_PRO_YEARLY=${STRIPE_PRICE_PRO_YEARLY:-}
      - STRIPE_PRICE_HYPER_MONTHLY=${STRIPE_PRICE_HYPER_MONTHLY:-}
      - STRIPE_PRICE_HYPER_YEARLY=${STRIPE_PRICE_HYPER_YEARLY:-}
      - OLLAMA_HOST=http://hypercode-ollama:11434
      - DEFAULT_LLM_MODEL=auto
      - OLLAMA_MODEL_PREFERRED=tinyllama:latest,tinyllama,phi3:latest,phi3
      - OLLAMA_MAX_MODEL_SIZE_MB=2500
      - OLLAMA_MODEL_REFRESH_SECONDS=300
      - OLLAMA_TEMPERATURE=0.3
      - OLLAMA_TOP_P=0.9
      - OLLAMA_TOP_K=40
      - OLLAMA_REPEAT_PENALTY=1.1
      - OLLAMA_NUM_CTX=2048
      - OLLAMA_NUM_PREDICT=256
      - PERPLEXITY_SESSION_AUTH=true
      - OTLP_EXPORTER_DISABLED=${OTLP_EXPORTER_DISABLED}
      - OTLP_ENDPOINT=http://tempo:4317
      - PROMETHEUS_METRICS_DISABLED=false
      - DB_AUTO_CREATE=true
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088,http://localhost:3000,http://127.0.0.1:3000}
      - COURSE_SYNC_SECRET=${COURSE_SYNC_SECRET:-}
      - SHOP_SYNC_SECRET=${SHOP_SYNC_SECRET:-}
      - MISSION_CONTROL_URL=${MISSION_CONTROL_URL:-}
    volumes:
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hypercode-ollama:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
      - agents-net
    ports:
      - "127.0.0.1:8000:8000" # Localhost only for security
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ====================
  # BUSINESS AGENTS
  # ====================
  # project-strategist-v2 removed (H2 fix) — duplicate of the profiled project-strategist.
  # Start with: docker compose --profile agents up -d

  # ====================
  # BROSKI BOT
  # ====================
  broski-bot:
    profiles: ["discord"]
    build:
      context: ./agents/broski-bot
      dockerfile: Dockerfile
    container_name: broski-bot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-hypercode}@postgres:5432/broski
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=broski
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-hypercode}
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - MEMSTREAM_API_TOKEN=${MEMSTREAM_API_TOKEN}
      - MEMSTREAM_API_URL=${MEMSTREAM_API_URL:-http://memstream:8011}
      - ENABLE_AUTO_MODERATION=true
      - ENABLE_ANALYTICS=true
      - PROMETHEUS_ENABLED=true
      - PROMETHEUS_PORT=8000
      - HYPERCODE_CORE_URL=http://hypercode-core:8000
      - OLLAMA_HOST=http://hypercode-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:3b}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - agents-net
      - data-net
    restart: no
    security_opt:
      - no-new-privileges:true
    command: ["python", "/app/src/main.py", "run"]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./agents/broski-bot/src:/app/src
      - ./docs/outputs:/app/outputs
      - ./agents/broski-nemoclaw-agent:/app/nemoclaw_agent:ro
      - ./backend:/app/backend_src:ro
      - ./agents:/app/project_agents:ro
      - ./reports/broski-analysis:/app/health_reports

  # OBSERVABILITY
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./monitoring/prometheus/docker_alerts.yml:/etc/prometheus/docker_alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - obs-net
      - agents-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.2.0}
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "127.0.0.1:3001:3000" # Localhost only
    networks:
      - obs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.8.1}
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.filesystem'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.netclass.ignored-devices=^$'
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - obs-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.47.2}
    container_name: cadvisor
    cap_add:
      - SYS_ADMIN
    command:
      - '--disable_metrics=disk,diskIO'
      - '--housekeeping_interval=120s'
      - '--storage_duration=1h'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8090:8080"
    networks:
      - obs-net
    restart: unless-stopped
    devices:
      - /dev/kmsg
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-hypercode}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-hypercode}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - data-net
      - obs-net   # allows Prometheus (obs-net) to scrape /minio/v2/metrics/cluster
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=${CHROMA_ALLOW_RESET:-FALSE}
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8009:8000"
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.1.0}
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          cpus: "0.1"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/lib/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:9412:9411"
    networks:
      - obs-net
      - agents-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.1.0}
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - promtail-positions:/run/promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9080/ready || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery-worker
    command: ["python", "-m", "celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "-Q", "main-queue"]
    dns:
      - 8.8.8.8
    volumes:
      - ./backend:/app
      - ./docs/outputs:/app/outputs
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      PYTHONPATH: /home/appuser/.local/lib/python3.11/site-packages:/app
      HYPERCODE_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hypercode}@postgres:5432/${POSTGRES_DB:-hypercode}
      HYPERCODE_REDIS_URL: redis://redis:6379/0
      HYPERCODE_MEMORY_KEY: ${HYPERCODE_MEMORY_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A app.core.celery_app inspect ping --timeout=5 || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      hypercode-core:
        condition: service_healthy
    networks:
      - agents-net
      - data-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  celery-exporter:
    image: ${CELERY_EXPORTER_IMAGE:-danihodovic/celery-exporter:latest}
    container_name: celery-exporter
    command: --broker-url=redis://redis:6379/0
    ports:
      - "127.0.0.1:9808:9808"
    networks:
      - obs-net
      - data-net
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9808/metrics', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    logging:
      driver: "json-file"
