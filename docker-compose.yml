      dockerfile: Dockerfile
    image: hypercode-v20-hyperhealth-worker
    container_name: hyperhealth-worker
    profiles: ["health"]
    restart: unless-stopped
    command: ["python", "-m", "worker"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-hypercode}@postgres:5432/${POSTGRES_DB:-hypercode}
      - REDIS_URL=redis://redis:6379/0
      - HEALER_URL=http://healer-agent:8008
      - CORE_URL=http://hypercode-core:8000
      - API_KEY=${API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - WORKER_CONCURRENCY=50
      - CHECK_BATCH_SIZE=100
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PD_ROUTING_KEY=${PD_ROUTING_KEY:-}
    networks:
      - agents-net
      - data-net
    depends_on:
      hyperhealth-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import redis, sys
          r = redis.from_url('redis://redis:6379/0', socket_timeout=5)
          val = r.get('hyperhealth:worker:heartbeat')
          sys.exit(0 if val else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    labels:
      - "hypercode.service=hyperhealth-worker"
      - "hypercode.role=check-executor"
