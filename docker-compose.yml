    profiles: ["disabled"]
    image: meltwater/docker-cleanup:latest
    container_name: docker-janitor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CLEAN_PERIOD=1800
      - DELAY_TIME=600
      - KEEP_IMAGES=true
      - KEEP_CONTAINERS=true
      - CLEAN_STOPPED_CONTAINERS=false
      - CLEAN_UNUSED_IMAGES=false
      - CLEAN_UNUSED_VOLUMES=false

  docker-socket-proxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:0.1.1}
    container_name: docker-socket-proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:2375/_ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - agents-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - BUILD=0
      - VOLUMES=1
      - NETWORKS=1
      - INFO=1
      - PING=1
      - VERSION=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /run
      - /var/lib/haproxy
    read_only: true

  docker-socket-proxy-build:
    profiles: ["ops", "hyper"]
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-tecnativa/docker-socket-proxy:0.1.1}
    container_name: docker-socket-proxy-build
    restart: unless-stopped
    networks:
      - agents-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - BUILD=1
      - VOLUMES=1
      - NETWORKS=1
      - INFO=1
      - PING=1
      - VERSION=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /run
      - /var/lib/haproxy
    read_only: true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2375/_ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  auto-prune:
    profiles: ["ops", "health"]
    image: ${DOCKER_CLI_IMAGE:-docker:27.3.1-cli}
    container_name: hyper-sweeper-prune
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy-build:2375
    command: >
      sh -c "echo '0 * * * * docker container prune -f && docker image prune -f --filter until=48h && docker builder prune -f --keep-storage=5gb' > /etc/crontabs/root && crond -f"
    restart: unless-stopped
    networks:
      - agents-net
    depends_on:
      docker-socket-proxy-build:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond"]
