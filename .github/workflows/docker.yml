name: Docker Build & Verify

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install docker pytest

      - name: Run Configuration Verification
        run: |
          # We skip the actual docker runtime checks in CI as they require the stack to be up
          # But we can verify the script syntax and importability
          python -m compileall tests/docker_verification.py

  build-and-push:
    needs: verify-config
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-core
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-dashboard

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Build and push Core API image
        id: build_core
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-core:${{ github.sha }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Core SBOM (image)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-core@${{ steps.build_core.outputs.digest }}
          format: spdx-json
          output-file: reports/sbom-hypercode-core.spdx.json
          artifact-name: hypercode-core.spdx
          upload-release-assets: false

      - name: Cosign attest Core SBOM
        if: github.event_name != 'pull_request'
        env:
          CORE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-core@${{ steps.build_core.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate reports/sbom-hypercode-core.spdx.json "${CORE_REF}"

      - name: Build and push Dashboard image
        id: build_dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./agents/dashboard
          file: ./agents/dashboard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-dashboard:${{ github.sha }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Dashboard SBOM (image)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-dashboard@${{ steps.build_dashboard.outputs.digest }}
          format: spdx-json
          output-file: reports/sbom-hypercode-dashboard.spdx.json
          artifact-name: hypercode-dashboard.spdx
          upload-release-assets: false

      - name: Cosign attest Dashboard SBOM
        if: github.event_name != 'pull_request'
        env:
          DASH_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-dashboard@${{ steps.build_dashboard.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate reports/sbom-hypercode-dashboard.spdx.json "${DASH_REF}"

      - name: Cosign sign images (keyless)
        if: github.event_name != 'pull_request'
        env:
          CORE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-core@${{ steps.build_core.outputs.digest }}
          DASH_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/hypercode-dashboard@${{ steps.build_dashboard.outputs.digest }}
        run: |
          cosign sign --yes "${CORE_REF}"
          cosign sign --yes "${DASH_REF}"

  build-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images (no push) and collect metrics
        run: |
          set -e
          build_img () { NAME=$1; CTX=$2; DOCKER_BUILDKIT=1 docker build -t $NAME $CTX; }
          measure () { NAME=$1; echo \"$NAME size:\" $(docker image inspect $NAME --format='{{.Size}}'); }
          # Build
          build_img hypercode-core:metrics \"./backend\"
          build_img hypercode-dashboard:metrics \"./agents/dashboard\"
          build_img crew-orchestrator:metrics \"./agents/crew-orchestrator\"
          build_img healer-agent:metrics \"./agents/healer\"
          # Metrics
          measure hypercode-core:metrics
          measure hypercode-dashboard:metrics
          measure crew-orchestrator:metrics
          measure healer-agent:metrics
      - name: Vulnerability scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hypercode-core:metrics
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
