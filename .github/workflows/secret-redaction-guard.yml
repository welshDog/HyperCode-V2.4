name: Secret Redaction Guard

on:
  push:
    branches: [ "main", "production", "feature/**", "fix/**" ]
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block committed NVIDIA_API_KEY
        shell: bash
        run: |
          set -euo pipefail

          if git grep -l -I -E '^[[:space:]]*NVIDIA_API_KEY[[:space:]]*=' -- .; then
            echo "ERROR: NVIDIA_API_KEY appears in tracked files. Remove it and use .env (gitignored) or CI secrets." >&2
            exit 1
          fi

          echo "ok: no committed NVIDIA_API_KEY detected"

