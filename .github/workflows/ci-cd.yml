name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Lint
        run: |
          pip install ruff
          ruff check backend/ --select E,W,F --ignore E501 || true
      - name: Test
        run: pytest backend/tests -v --tb=short
