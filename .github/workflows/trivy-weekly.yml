name: 🔒 Weekly Fleet Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:       # Manual trigger — run anytime from Actions tab

permissions:
  contents: read

jobs:
  weekly-fleet-scan:
    name: Fleet Scan — ${{ matrix.agent }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: agent-x
            dockerfile: agents/agent-x/Dockerfile
            context: .
          - agent: healer
            dockerfile: agents/healer/Dockerfile
            context: .
          - agent: hyper-architect
            dockerfile: agents/hyper-agents/architect/Dockerfile
            context: .
          - agent: hyper-observer
            dockerfile: agents/hyper-agents/observer/Dockerfile
            context: .
          - agent: hyper-worker
            dockerfile: agents/hyper-agents/worker/Dockerfile
            context: .
          - agent: 05-devops-engineer
            dockerfile: agents/05-devops-engineer/Dockerfile
            context: .
          - agent: coder
            dockerfile: agents/coder/Dockerfile
            context: agents/coder
          - agent: crew-orchestrator
            dockerfile: agents/crew-orchestrator/Dockerfile
            context: agents/crew-orchestrator
          - agent: broski-bot
            dockerfile: agents/broski-bot/Dockerfile
            context: agents/broski-bot
          - agent: throttle-agent
            dockerfile: agents/throttle-agent/Dockerfile
            context: agents/throttle-agent
          - agent: coderabbit-webhook
            dockerfile: agents/coderabbit-webhook/Dockerfile
            context: agents/coderabbit-webhook
          - agent: 01-frontend-specialist
            dockerfile: agents/01-frontend-specialist/Dockerfile
            context: agents/01-frontend-specialist
          - agent: 02-backend-specialist
            dockerfile: agents/02-backend-specialist/Dockerfile
            context: agents/02-backend-specialist
          - agent: 03-database-architect
            dockerfile: agents/03-database-architect/Dockerfile
            context: agents/03-database-architect
          - agent: 04-qa-engineer
            dockerfile: agents/04-qa-engineer/Dockerfile
            context: agents/04-qa-engineer
          - agent: 06-security-engineer
            dockerfile: agents/06-security-engineer/Dockerfile
            context: agents/06-security-engineer
          - agent: 07-system-architect
            dockerfile: agents/07-system-architect/Dockerfile
            context: agents/07-system-architect
          - agent: 08-project-strategist
            dockerfile: agents/08-project-strategist/Dockerfile
            context: agents/08-project-strategist
          - agent: 09-tips-tricks-writer
            dockerfile: agents/09-tips-tricks-writer/Dockerfile
            context: agents/09-tips-tricks-writer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t hypercode-weekly-${{ matrix.agent }}:scan \
            ${{ matrix.context }}

      - name: Trivy scan — JSON report
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hypercode-weekly-${{ matrix.agent }}:scan
          format: json
          output: trivy-${{ matrix.agent }}.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '0'  # weekly scan never blocks — just reports

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.agent }}
          path: trivy-${{ matrix.agent }}.json
          retention-days: 90

  # ── Aggregate report job (runs after all scans complete) ──────────────────
  weekly-report:
    name: Fleet Report — Aggregate
    runs-on: ubuntu-latest
    needs: weekly-fleet-scan
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all JSON reports
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-*
          merge-multiple: true
          path: reports/

      - name: Generate fleet report
        run: |
          python3 - << 'PY'
          import json, os, glob
          from datetime import datetime

          files = glob.glob("reports/trivy-*.json")
          rows = []
          total_crit = 0
          total_high = 0

          for f in sorted(files):
              agent = os.path.basename(f).replace("trivy-", "").replace(".json", "")
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  vulns = []
                  for result in (data.get("Results") or []):
                      vulns.extend(result.get("Vulnerabilities") or [])
                  crits = sum(1 for v in vulns if v.get("Severity") == "CRITICAL")
                  highs = sum(1 for v in vulns if v.get("Severity") == "HIGH")
              except Exception as e:
                  crits, highs = "ERR", "ERR"
              total_crit += crits if isinstance(crits, int) else 0
              total_high += highs if isinstance(highs, int) else 0
              status = "🟢" if crits == 0 else "🔴"
              rows.append(f"| {status} `{agent}` | {crits} | {highs} |")

          lines = [
              "# 📊 Weekly Trivy Fleet Report",
              f"**Generated:** {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
              f"**Images scanned:** {len(files)}",
              f"**Total CRITICAL:** {total_crit}  |  **Total HIGH:** {total_high}",
              "",
              "| Status | Agent | CRITICAL | HIGH |",
              "|--------|-------|----------|------|",
          ] + rows

          report = "\n".join(lines)
          print(report)

          with open("weekly-trivy-report.md", "w") as f:
              f.write(report)
          PY

      - name: Write to job summary
        run: cat weekly-trivy-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload fleet report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-fleet-report
          path: weekly-trivy-report.md
          retention-days: 90
