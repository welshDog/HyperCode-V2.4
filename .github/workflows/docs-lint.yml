name: Docs Lint

on:
  pull_request:
    paths:
      - '**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdownlint
        uses: avto-dev/markdown-lint@v1
        with:
          input: '.'

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --exclude-mail
            --exclude "(^http://localhost|^http://127\\.0\\.0\\.1)"
            --exclude-path docs/reports
            --exclude-path docs/archive
            --exclude-path docs/notes
            --exclude-path docs/outputs
            README.md
            QUICKSTART.md
            START_HERE.md
            docs/INDEX.md
            docs/**/*.md
