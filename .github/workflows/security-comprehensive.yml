name: Security — Comprehensive Scan

on:
  push:
    branches: [main]        # ← main only, never feature branches
  schedule:
    - cron: '0 3 * * 1'    # Weekly Monday 03:00 UTC
  workflow_dispatch:
    inputs:
      severity_override:
        description: 'Minimum severity to report (CRITICAL/HIGH/MEDIUM/LOW)'
        required: false
        default: 'HIGH'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true   # cancel old run if new push lands

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  REPORTS_DIR: reports/security
  PYTHON_VERSION: '3.11'

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        id: semgrep
        env:
          SEMGREP_RULES: p/python p/secrets p/jwt p/docker p/owasp-top-ten
        run: |
          mkdir -p ${{ env.REPORTS_DIR }}
          semgrep scan \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/jwt" \
            --config "p/docker" \
            --config "p/owasp-top-ten" \
            --sarif --output ${{ env.REPORTS_DIR }}/semgrep.sarif \
            --json --output ${{ env.REPORTS_DIR }}/semgrep.json \
            --severity ERROR \
            --exclude "tests/" --exclude "*.lock" \
            --exclude "node_modules/" --exclude ".venv/" \
            --exclude "agents/broski-bot/_archive/" \
            --error || echo "SEMGREP_FINDINGS=true" >> $GITHUB_ENV
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.REPORTS_DIR }}/semgrep.sarif
          category: semgrep-sast
      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-report
          path: ${{ env.REPORTS_DIR }}/semgrep.json
          retention-days: 14   # ← reduced from 30

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 14
      - name: Fail on secrets found
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets. Review results.sarif."
          exit 1

  pip-audit:
    name: pip-audit (Python CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend requirements
        id: audit_backend
        run: |
          mkdir -p ${{ env.REPORTS_DIR }}
          pip-audit \
            -r backend/requirements.txt \
            --format json \
            --output ${{ env.REPORTS_DIR }}/pip-audit-backend.json \
            || echo "BACKEND_VULNS=true" >> $GITHUB_ENV
        continue-on-error: true
      - name: Upload pip-audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-reports
          path: ${{ env.REPORTS_DIR }}/pip-audit-*.json
          retention-days: 14
      - name: Fail on CRITICAL Python CVEs
        if: env.BACKEND_VULNS == 'true'
        run: |
          echo "::error::pip-audit found vulnerabilities. Review pip-audit-reports artifact."
          exit 1

  trivy-full:
    name: Trivy (FS + IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: library
          severity: CRITICAL,HIGH
          trivy-config: trivy.yaml
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Trivy SARIF (FS)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
      - name: Upload Trivy SARIF (IaC)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  security-gate:
    name: Security Gate
    needs: [semgrep, gitleaks, pip-audit, trivy-full]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          echo "semgrep:   ${{ needs.semgrep.result }}"
          echo "gitleaks:  ${{ needs.gitleaks.result }}"
          echo "pip-audit: ${{ needs.pip-audit.result }}"
          echo "trivy:     ${{ needs.trivy-full.result }}"
          FAILED=""
          [ "${{ needs.semgrep.result }}"   == "failure" ] && FAILED="$FAILED semgrep"
          [ "${{ needs.gitleaks.result }}"  == "failure" ] && FAILED="$FAILED gitleaks"
          [ "${{ needs.pip-audit.result }}" == "failure" ] && FAILED="$FAILED pip-audit"
          if [ -n "$FAILED" ]; then
            echo "::error::Security gate FAILED. Blocking jobs:$FAILED"
            exit 1
          fi
          echo "Security gate PASSED."
