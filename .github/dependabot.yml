# HyperCode V2.0 — Dependabot Auto-Update Config
# Keeps Python + npm deps patched automatically 🛡️

version: 2

updates:

  # ── Python (pip) ──────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignore major version bumps on openai — test manually
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]

