# ═══════════════════════════════════════════════════════════════════
# 🧠 HyperCode V2.0 — Grafana Cloud Observability Stack
# Covers: Prometheus → Grafana Cloud remote write
#         Loki (logs) → Grafana Cloud
#         Tempo (traces) → Grafana Cloud
#         All 14+ agents scraped + PYTHONPATH fixed for metrics.py
# ═══════════════════════════════════════════════════════════════════
networks:
  backend-net:
    name: hypercode_public_net
    external: true

volumes:
  prometheus-data:

services:

  # ─────────────────────────────────────────
  # 📡 PROMETHEUS — scrapes all agents + infra
  # ─────────────────────────────────────────
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    container_name: prometheus-cloud
    volumes:
      - ./monitoring/prometheus/prometheus.cloud.local.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - ./monitoring/prometheus/docker_alerts.yml:/etc/prometheus/docker_alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # 🌐 GRAFANA AGENT — ships metrics + logs + traces to Grafana Cloud
  # Replaces manual remote_write — single shipper for everything
  # ─────────────────────────────────────────
  grafana-agent:
    # Supply-chain note: pin this via GRAFANA_AGENT_IMAGE (ideally with a digest) in .env.
    image: ${GRAFANA_AGENT_IMAGE:-grafana/agent:latest}
    container_name: grafana-agent
    volumes:
      - ./monitoring/grafana-agent/agent.river:/etc/agent/config.river
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/agent/config.river
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USERNAME=${GRAFANA_CLOUD_PROMETHEUS_USERNAME}
      - GRAFANA_CLOUD_LOKI_URL=${GRAFANA_CLOUD_LOKI_URL}
      - GRAFANA_CLOUD_LOKI_USERNAME=${GRAFANA_CLOUD_LOKI_USERNAME}
      - GRAFANA_CLOUD_TEMPO_URL=${GRAFANA_CLOUD_TEMPO_URL}
      - GRAFANA_CLOUD_TEMPO_USERNAME=${GRAFANA_CLOUD_TEMPO_USERNAME}
      - GRAFANA_CLOUD_ACCESS_TOKEN=${GRAFANA_CLOUD_ACCESS_TOKEN}
    ports:
      - "127.0.0.1:12345:12345"  # Agent UI (localhost only)
    networks:
      - backend-net
    restart: unless-stopped
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
