version: '3.8'

services:
  bot:
    build: .
    container_name: broski-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - broski-network
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models

  postgres:
    image: postgres:14-alpine
    container_name: broski-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: broski_bot
      POSTGRES_USER: broski
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - broski-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broski"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: broski-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - broski-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  broski-network:
    driver: bridge
