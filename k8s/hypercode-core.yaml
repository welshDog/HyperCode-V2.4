apiVersion: v1
kind: Namespace
metadata:
  name: hypercode
  labels:
    name: hypercode

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hypercode-config
  namespace: hypercode
data:
  ENVIRONMENT: "production"
  OLLAMA_HOST: "http://ollama:11434"
  DEFAULT_LLM_MODEL: "auto"
  OTLP_ENDPOINT: "http://tempo:4317"

---
apiVersion: v1
kind: Secret
metadata:
  name: hypercode-secrets
  namespace: hypercode
type: Opaque
data:
  # Base64 encoded secrets - replace with actual values
  # echo -n "your-secret" | base64
  HYPERCODE_JWT_SECRET: eW91ci1qd3Qtc2VjcmV0LWhlcmU=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  PERPLEXITY_API_KEY: c2stYW50LXlvdXItYXBpLWtleQ==

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypercode-core
  namespace: hypercode
  labels:
    app: hypercode-core
    version: v2.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hypercode-core
  template:
    metadata:
      labels:
        app: hypercode-core
        version: v2.0.0
    spec:
      serviceAccountName: hypercode
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      
      containers:
      - name: hypercode-core
        image: hypercode:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: hypercode-config
        - secretRef:
            name: hypercode-secrets
        
        env:
        - name: HYPERCODE_DB_URL
          valueFrom:
            secretKeyRef:
              name: hypercode-secrets
              key: HYPERCODE_DB_URL
        - name: HYPERCODE_REDIS_URL
          value: "redis://redis:6379/0"
        
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hypercode-core
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: hypercode-core
  namespace: hypercode
  labels:
    app: hypercode-core
spec:
  type: ClusterIP
  selector:
    app: hypercode-core
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hypercode-core-hpa
  namespace: hypercode
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hypercode-core
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hypercode-core-pdb
  namespace: hypercode
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hypercode-core
