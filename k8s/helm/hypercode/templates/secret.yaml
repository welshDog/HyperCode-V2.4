{{- if not .Values.secrets.useExisting }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hypercode.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hypercode.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  api-key: {{ .Values.secrets.values.apiKey | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.values.jwtSecret | b64enc | quote }}
  memory-key: {{ .Values.secrets.values.memoryKey | b64enc | quote }}
{{- end }}
