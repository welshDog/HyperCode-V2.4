apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hypercode.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hypercode.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.core.env.ENVIRONMENT | quote }}
  LOG_LEVEL: {{ .Values.core.env.LOG_LEVEL | quote }}
  OTLP_ENDPOINT: {{ .Values.core.env.OTLP_ENDPOINT | quote }}
  POSTGRES_DB: "hypercode"
  POSTGRES_USER: "hypercode"
  REDIS_URL: {{ include "hypercode.redisUrl" . | quote }}
  HYPERCODE_DB_URL: {{ include "hypercode.databaseUrl" . | quote }}
  CORS_ALLOW_ORIGINS: "http://localhost:8088,http://localhost:3000"
  CELERY_BROKER_URL: {{ include "hypercode.redisUrl" . | quote }}
  CELERY_RESULT_BACKEND: "{{ include "hypercode.redisUrl" . }}/1"
  NEXT_PUBLIC_CORE_URL: "http://{{ include "hypercode.fullname" . }}-core:8000"
