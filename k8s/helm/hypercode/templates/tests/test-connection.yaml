apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hypercode.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hypercode.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-core-health
      image: curlimages/curl:8.8.0
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing Core API health..."
          curl -sf http://{{ include "hypercode.fullname" . }}-core:{{ .Values.core.service.port }}/health
          echo "Core API: OK"

          echo "Testing Orchestrator health..."
          curl -sf http://{{ include "hypercode.fullname" . }}-orchestrator:{{ .Values.orchestrator.service.port }}/health
          echo "Orchestrator: OK"

          echo "Testing Healer health..."
          curl -sf http://{{ include "hypercode.fullname" . }}-healer:{{ .Values.healer.service.port }}/health
          echo "Healer: OK"

          echo "All health checks passed ✓"
