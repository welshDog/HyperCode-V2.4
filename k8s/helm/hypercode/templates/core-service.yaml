{{- if .Values.core.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hypercode.fullname" . }}-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hypercode.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  type: {{ .Values.core.service.type }}
  ports:
    - port: {{ .Values.core.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hypercode.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: core
{{- end }}
