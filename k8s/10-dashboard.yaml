apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: hypercode
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: hypercode-v20-dashboard:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: hypercode-secrets
        env:
        - name: NEXT_PUBLIC_CORE_URL
          value: "http://hypercode-core:8000"
        - name: NEXT_PUBLIC_AGENTS_URL
          value: "http://hypercode-core:8000"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: hypercode
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: dashboard
