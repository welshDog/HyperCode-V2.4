apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypercode-core
  namespace: hypercode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hypercode-core
  template:
    metadata:
      labels:
        app: hypercode-core
    spec:
      containers:
      - name: hypercode-core
        image: hypercode-v20-hypercode-core:latest 
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: hypercode-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hypercode-secrets
              key: HYPERCODE_DB_URL
        resources:
          limits:
            memory: "512Mi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hypercode-core
  namespace: hypercode
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: hypercode-core
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: hypercode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: hypercode-v20-celery-worker:latest 
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "app.worker.celery", "worker", "--loglevel=info"]
        envFrom:
        - secretRef:
            name: hypercode-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hypercode-secrets
              key: HYPERCODE_DB_URL
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "200m"
